name: CI pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkoutcode
        uses: actions/checkout@v4

      - name: set up Node.js
        uses: actions/setup-node@v3
        with: 
          node-version:16

      - name: install dependcies
        run: npm install
    
      - name: Run tests
        run: npm test
